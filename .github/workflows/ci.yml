name: CI

# Runs on every PR into main, and on pushes to main itself.
# This is the gate that must pass before a PR can be merged.
# Deploy jobs will be added later for the full CI/CD flow.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: false

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race -count=1
