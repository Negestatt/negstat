name: Deploy staging to GitHub Pages

# Deploys the static frontend to GitHub Pages whenever changes land on `staging`
# (i.e. after a reviewed PR is approved and merged into staging).
on:
  push:
    branches: [staging]
  workflow_dispatch:

# Allow this workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer runs cancel older in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (static, base path = /negstat)
        env:
          BASE_PATH: /negstat
        run: npm run build

      - name: Add SPA fallback for deep links
        run: cp build/index.html build/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
